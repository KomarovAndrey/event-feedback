<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оцените мероприятие</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      font-family: 'Manrope', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      transition: opacity 0.4s ease;
    }

    .screen {
      text-align: center;
      max-width: 420px;
    }

    .screen.hidden {
      display: none;
    }

    h1 {
      color: #f5f5f5;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      margin-bottom: 3rem;
      letter-spacing: -0.02em;
    }

    .buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      width: 100px;
      height: 100px;
      border: none;
      border-radius: 50%;
      font-size: 3rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      transform: scale(1.08);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-excellent {
      background: linear-gradient(145deg, #22c55e, #16a34a);
      box-shadow: 0 8px 24px rgba(34, 197, 94, 0.35);
    }

    .btn-excellent:hover {
      box-shadow: 0 12px 32px rgba(34, 197, 94, 0.45);
    }

    .btn-ok {
      background: linear-gradient(145deg, #eab308, #ca8a04);
      box-shadow: 0 8px 24px rgba(234, 179, 8, 0.35);
    }

    .btn-ok:hover {
      box-shadow: 0 12px 32px rgba(234, 179, 8, 0.45);
    }

    .btn-bad {
      background: linear-gradient(145deg, #ef4444, #dc2626);
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.35);
    }

    .btn-bad:hover {
      box-shadow: 0 12px 32px rgba(239, 68, 68, 0.45);
    }

    .thank-you {
      color: #f5f5f5;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 600;
      padding: 2rem;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div id="rating-screen" class="screen">
    <h1>Оцените мероприятие</h1>
    <div class="buttons">
      <button type="button" class="btn btn-excellent" data-rating="excellent" title="Отлично" aria-label="Отлично">😊</button>
      <button type="button" class="btn btn-ok" data-rating="ok" title="Нормально" aria-label="Нормально">😐</button>
      <button type="button" class="btn btn-bad" data-rating="bad" title="Плохо" aria-label="Плохо">😞</button>
    </div>
  </div>

  <div id="thank-you-screen" class="screen hidden">
    <p class="thank-you">Спасибо за обратную связь!</p>
  </div>

  <script>
    const STORAGE_KEYS = { excellent: 'feedback_good', ok: 'feedback_neutral', bad: 'feedback_bad' };

    const ratingScreen = document.getElementById('rating-screen');
    const thankYouScreen = document.getElementById('thank-you-screen');
    const buttons = document.querySelectorAll('.btn');
    const RETURN_DELAY_MS = 3000;

    function getCount(key) {
      const n = parseInt(localStorage.getItem(STORAGE_KEYS[key]) || '0', 10);
      return isNaN(n) ? 0 : n;
    }

    function setCount(key, value) {
      localStorage.setItem(STORAGE_KEYS[key], String(value));
    }

    function showThankYou() {
      ratingScreen.classList.add('hidden');
      thankYouScreen.classList.remove('hidden');
      setTimeout(() => {
        thankYouScreen.classList.add('hidden');
        ratingScreen.classList.remove('hidden');
      }, RETURN_DELAY_MS);
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const formRating = btn.getAttribute('data-rating');
        if (STORAGE_KEYS[formRating]) {
          const count = getCount(formRating);
          setCount(formRating, count + 1);
        }
        showThankYou();
      });
    });
  </script>
</body>
</html>
