<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Отчёт по оценкам</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>Отчёт по оценкам</h1>

      <div id="loading">Загружаем данные...</div>
      <p id="error-message" class="error-message" hidden></p>

      <div id="stats" class="stats" hidden>
        <div class="stat-item">
          <span class="stat-emoji">😊</span>
          <span class="stat-label">Отлично</span>
          <span id="count-good" class="stat-value">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-emoji">😐</span>
          <span class="stat-label">Нормально</span>
          <span id="count-neutral" class="stat-value">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-emoji">☹️</span>
          <span class="stat-label">Плохо</span>
          <span id="count-bad" class="stat-value">0</span>
        </div>
        <div class="stat-item stat-total">
          <span class="stat-label">Всего ответов</span>
          <span id="count-total" class="stat-value">0</span>
        </div>
        <button type="button" id="reset-btn" class="btn-reset">Сбросить статистику</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEYS = { good: 'feedback_good', neutral: 'feedback_neutral', bad: 'feedback_bad' };

    const loadingEl = document.getElementById("loading");
    const errorMessage = document.getElementById("error-message");
    const statsEl = document.getElementById("stats");
    const countGoodEl = document.getElementById("count-good");
    const countNeutralEl = document.getElementById("count-neutral");
    const countBadEl = document.getElementById("count-bad");
    const countTotalEl = document.getElementById("count-total");

    function showCounts(counts, source) {
      const total = counts.good + counts.neutral + counts.bad;
      countGoodEl.textContent = counts.good;
      countNeutralEl.textContent = counts.neutral;
      countBadEl.textContent = counts.bad;
      countTotalEl.textContent = total;
      loadingEl.hidden = true;
      statsEl.hidden = false;
    }

    function getLocalCount(rating) {
      const n = parseInt(localStorage.getItem(STORAGE_KEYS[rating]) || '0', 10);
      return isNaN(n) ? 0 : n;
    }

    async function loadStats() {
      errorMessage.hidden = true;
      statsEl.hidden = true;
      loadingEl.hidden = false;
      loadingEl.textContent = "Загружаем данные...";

      try {
        const res = await fetch('/api/stats');
        if (res.ok) {
          const data = await res.json();
          showCounts({ good: data.good, neutral: data.neutral, bad: data.bad }, 'api');
          return;
        }
      } catch (err) {
        console.warn('API недоступен, показываю локальную статистику:', err);
      }

      const counts = {
        good: getLocalCount('good'),
        neutral: getLocalCount('neutral'),
        bad: getLocalCount('bad')
      };
      showCounts(counts, 'local');
    }

    function clearLocalStats() {
      Object.values(STORAGE_KEYS).forEach((key) => localStorage.removeItem(key));
    }

    async function handleReset() {
      try {
        const res = await fetch('/api/reset', { method: 'POST' });
        if (res.ok) {
          clearLocalStats();
          loadStats();
          return;
        }
      } catch (err) {
        console.warn('API сброса недоступен:', err);
      }
      clearLocalStats();
      loadStats();
    }

    loadStats();
    document.getElementById('reset-btn').addEventListener('click', handleReset);
  </script>
</body>
</html>
